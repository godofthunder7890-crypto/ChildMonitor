name: Build ChildMonitor APK + Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK 36 & Build Tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: sed -i 's/\r$//' ./gradlew && chmod +x ./gradlew

      # Cache keystore so APK signature stays consistent across builds.
      # If cache expires a new key is generated — users would need to uninstall
      # and reinstall (unavoidable without a stored keystore secret).
      - name: Restore signing keystore from cache
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: release.jks
          key: childmonitor-signing-keystore-v1

      - name: Generate signing keystore (only on first run)
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          keytool -genkey -v -keystore release.jks \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass guardian_2024 -keypass guardian_2024 \
            -alias guardian \
            -dname "CN=GuardianEye,OU=Dev,O=Personal,L=IN,S=IN,C=IN"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_PATH: release.jks
          STORE_PASS: guardian_2024
          KEY_ALIAS: guardian
          KEY_PASS: guardian_2024
          RAILWAY_WS_URL: ${{ secrets.RAILWAY_WS_URL }}

      - name: Rename APK for release
        run: cp app/build/outputs/apk/release/app-release.apk ChildMonitor.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChildMonitor-release-APK-${{ github.run_number }}
          path: ChildMonitor.apk
          retention-days: 30

      # Compute SHA-256 so KidsInstaller's VersionChecker can verify integrity
      - name: Compute SHA-256 checksum
        run: sha256sum ChildMonitor.apk | awk '{print $1}' > ChildMonitor.apk.sha256

      # Delete old release first, then create new one.
      # NOTE: this is not atomic — if create fails the release is temporarily absent.
      # KidsInstaller's AutoUpdater retries on failure so brief gaps are tolerated.
      - name: Delete previous latest-build release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest-build --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub Release with APK + SHA-256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest-build \
            --title "ChildMonitor — Latest Build ($(date '+%Y-%m-%d %H:%M'))" \
            --notes "Auto-built from main branch. KidsInstaller downloads this automatically." \
            --latest \
            ChildMonitor.apk \
            ChildMonitor.apk.sha256
